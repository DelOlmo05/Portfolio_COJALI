<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nuevo estudio</title>

    <link rel="stylesheet" href="CSS/comun.css">
    <link rel="stylesheet" href="CSS/nuevo_estudio.css">

</head>

<body>

    <header>

        <h1>Añadir nuevo estudio</h1>

    </header>

    <main class="pagina-formulario">

        <form id="formularioEstudio">

            <fieldset>

                <legend>Nuevo estudio</legend>

                <label for="nombre">

                    Nombre del estudio:

                </label>

                <input type="text"
                       id="nombre"
                       required>

                <br><br>

                <label for="centro">

                    Centro:

                </label>

                <input type="text"
                       id="centro"
                       required>

                <br><br>

                <label for="descripcion">

                    Descripción:

                </label>

                <textarea id="descripcion"
                          rows="5"
                          required></textarea>

                <br><br>

                <button type="submit">

                    Guardar estudio

                </button>

                <a class="boton"
                   href="Portfolio.html">

                    Volver al portfolio

                </a>

            </fieldset>

        </form>

    </main>

    <script src="JS/script.js"></script>

</body>

</html>
